name: NodeLoc Auto Login

on:
  schedule:
    # 每天 UTC 时间凌晨 0 点运行一次 (北京/台北时间上午 8 点)
    - cron: '0 0 * * *'
  workflow_dispatch: # 允许你在 GitHub 页面上手动点击按钮触发运行

jobs:
  login-task:
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v3

      - name: 设置 Python 环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          playwright install chromium

      - name: 执行登录脚本
        env:
          # 将 GitHub Secrets 映射为环境变量，供 Python 脚本读取
          NODELOC_USERNAME: ${{ secrets.NODELOC_USERNAME }}
          NODELOC_PASSWORD: ${{ secrets.NODELOC_PASSWORD }}
        run: python login.py
